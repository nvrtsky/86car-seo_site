  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

idth:640px;line-height:1.55\">Компания на рынке с 2014 года. Более 6 000 клиентов взяли автомобиль в аренду, прокат или с правом выкупа для личных и профессиональных целей — наши принципы: скорость, надёжность и качество.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:{{ cols1_3 }};gap:14px\">\n      <sc-for list=\"{{ perks }}\" as=\"pk\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;gap:14px;padding:18px;border:1px solid #E9EEF4;border-radius:14px\">\n          <div style=\"flex:none;width:10px;height:10px;border-radius:50%;background:#FFC53D;margin-top:6px\"><\u002Fdiv>\n          <div>\n            <div style=\"font-weight:800;font-size:15px;margin-bottom:4px\">{{ pk.t }}<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#5B6B7E;line-height:1.5\">{{ pk.d }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ИСТОРИИ ВЫКУПА -->\n  <div style=\"max-width:1200px;margin:0 auto;padding:52px 24px 8px\">\n    <h2 style=\"margin:0 0 6px;font-size:28px;font-weight:800;letter-spacing:-.3px\">Они уже выкупили свой автомобиль<\u002Fh2>\n    <p style=\"margin:0 0 26px;color:#5B6B7E;font-size:15px\">480+ водителей стали собственниками машин через 86car<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:{{ cols1_3 }};gap:16px\">\n      <sc-for list=\"{{ stories }}\" as=\"stq\" hint-placeholder-count=\"3\">\n        <div style=\"background:#0E2239;color:#fff;border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:14px\">\n          <div style=\"font-size:14.5px;line-height:1.6;color:#D9E2EC;flex:1\">«{{ stq.text }}»<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div style=\"width:42px;height:42px;border-radius:50%;background:#FFC53D;color:#14304F;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px\">{{ stq.init }}<\u002Fdiv>\n            <div>\n              <div st style-hover=\"border-color:#fff\">Написать<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:16px;padding:18px 22px;background:#F7FAFD;border:1px solid #E9EEF4;border-radius:13px;font-size:13.5px;color:#5B6B7E;line-height:1.6\">\n    <b style=\"color:#14304F\">Аренда автомобилей в Сургуте.<\u002Fb> Автопарк 86car — это 250 автомобилей от Lada Granta до Toyota Camry: аренда под такси с подключением к Яндекс Про, посуточный прокат для личных поездок, аренда с правом выкупа от 12 месяцев и лизинг для юридических лиц. Работаем в Сургуте, Нефтеюганске, Нижневартовске и других городах ХМАО–Югры.\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ======================= КАРТОЧКА АВТО + БРОНИРОВАНИЕ ======================= -->\n<sc-if value=\"{{ isCar }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Карточка авто\" style=\"max-width:1200px;margin:0 auto;padding:36px 24px 60px\">\n  <div style=\"font-size:12.5px;color:#5B6B7E;margin-bottom:10px\"><a onclick=\"{{ goHome }}\" style=\"cursor:pointer\">Главная<\u002Fa> / <a onclick=\"{{ goCatalog }}\" style=\"cursor:pointer\">Каталог<\u002Fa> / {{ curCar.name }}<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:{{ carGrid }};gap:36px;align-items:start\">\n\n    <div>\n      <h1 style=\"margin:0 0 4px;font-size:32px;font-weight:800;letter-spacing:-.4px\">{{ curCar.name }} {{ curCar.year }}<\u002Fh1>\n      <div style=\"color:#5B6B7E;font-size:14.5px;margin-bottom:18px\">{{ curCar.cls }} · {{ curCar.kpp }} · {{ curCar.fuel }} · брендирование под Яндекс Такси<\u002Fdiv>\n      <div style=\"height:340px;margin-bottom:14px\">\n        <x-import component-from-global-scope=\"image-slot\" from=\"78f58fe9-08a4-4232-bdd4-1fb2798a226a#/image-slot.js\" id=\"car-photo-main\" shape=\"rounded\" radius=\"16\" placeholder=\"Фото автомобиля\" hint-size=\"100%,340px\" style=\"width:100%;height:340px\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:{{ cols2_4 }};gap:10px;margin-bottom:26px\">\n        <sc-for list=\"{{ carSpecs }}\" as=\"sp\" hint-placeholder-count=\"4\">\n          <div style=\"border:1px solid #E9EEF4;border-radius:12px;padding:12px 14px\">\n            <div style=\"font-size:11.5px;color:#5B6B7E;margin-bottom:3px\">{{ sp.l }}<\u002Fdiv>\n            <div style=\"font-weight:800;font-size:14px\">{{ sp.v }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <h3 style=\"margin:0 0 12px;font-size:19px;font-weight:800\">Тарифы<\u002Fh3>\n      <div style=\"display:grid;grid-template-columns:{{ cols1_3 }};gap:10px;margin-bottom:26px\">\n        <div style=\"border:1.5px solid #E3E8EF;border-radius:13px;padding:16px\">\n          <div style=\"font-size:12.5px;color:#5B6B7E;margin-bottom:4px\">Посуточно<\u002Fdiv>\n          <div style=\"font-weight:800;font-size:19px\">{{ curCar.dayFmt }}<span style=\"font-size:12.5px;font-weight:600;color:#5B6B7E\"> /сут<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1.5px solid #E3E8EF;border-radius:13px;padding:16px\">\n          <div style=\"font-size:12.5px;color:#5B6B7E;margin-bottom:4px\">Помесячно<\u002Fdiv>\n          <div style=\"font-weight:800;font-size:19px\">{{ curCar.monthFmt }}<span style=\"font-size:12.5px;font-weight:600;color:#5B6B7E\"> /мес<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ curCar.hasBuyout }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border:1.5px solid #FFC53D;background:#FFF9EB;border-radius:13px;padding:16px\">\n            <div style=\"font-size:12.5px;color:#8A6D1F;margin-bottom:4px\">Аренда с выкупом<\u002Fdiv>\n            <div style=\"font-weight:800;font-size:19px\">{{ curCar.buyoutFmt }}<span style=\"font-size:12.5px;font-weight:600;color:#8A6D1F\"> /сут · {{ curCar.buyoutMonths }} мес<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid #E9EEF4;border-radius:13px;padding:16px 18px;background:#F7FAFD;font-size:13.5px;color:#5B6B7E;line-height:1.6\">\n        В стоимость включено: ОСАГО и страхование пассажиров, ТО и сезонная резина, подменный автомобиль при ДТП не по вине водителя, круглосуточная техподдержка парка.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Панель бронирования -->\n    <div style=\"border:1.5px solid #E3E8EF;border-radius:18px;padding:24px;position:{{ bookPos }};top:92px;background:#fff;box-shadow:0 14px 40px rgba(20,48,79,.07)\">\n      <sc-if value=\"{{ bookingDone }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:20px 6px\">\n          <div style=\"width:56px;height:56px;border-radius:50%;background:#E7F6EC;color:#2E9E5B;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;margin:0 auto 14px\">✓<\u002Fdiv>\n          <div style=\"font-weight:800;font-size:19px;margin-bottom:8px\">Заявка № {{ leadId }} принята<\u002Fdiv>\n          <div style=\"font-size:14px;color:#5B6B7E;line-height:1.6;margin-bottom:16px\">Лид передан в CRM. Менеджер свяжется с вами в течение 15 минут и подтвердит бронь на {{ selLabel }}.<\u002Fdiv>\n          <div style=\"font-size:12px;color:#9AA7B5;background:#F7FAFD;border-radius:9px;padding:10px;font-family:ui-monospace,monospace;text-align:left\">POST /api/v1/leads → 201 Created<br>source: \"site_booking\"<br>car_id: {{ curCar.id }} · status: \"new\"<\u002Fdiv>\n          <div onclick=\"{{ resetBooking }}\" style=\"margin-top:16px;font-size:13.5px;font-weight:700;color:#1B5FAB;cursor:pointer\">← Новая заявка<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ bookingFormVisible }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-weight:800;font-size:18px;margin-bottom:4px\">Бронирование<\u002Fdiv>\n        <div style=\"font-size:13px;color:#5B6B7E;margin-bottom:16px\">Занятость синхронизируется с CRM · обновлено сегодня в 09:41<\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">\n          <div onclick=\"{{ prevMonth }}\" style=\"width:30px;height:30px;border:1px solid #E3E8EF;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;color:{{ prevColor }}\">‹<\u002Fdiv>\n          <div style=\"font-weight:800;font-size:14.5px\">{{ monthLabel }}<\u002Fdiv>\n          <div onclick=\"{{ nextMonth }}\" style=\"width:30px;height:30px;border:1px solid #E3E8EF;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700\">›<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px\">\n          <sc-for list=\"{{ weekDays }}\" as=\"wd\" hint-placeholder-count=\"7\">\n            <div style=\"text-align:center;font-size:11px;font-weight:800;color:#9AA7B5;padding:4px 0\">{{ wd }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px\">\n          <sc-for list=\"{{ calDays }}\" as=\"d\" hint-placeholder-count=\"35\">\n            <div onclick=\"{{ d.click }}\" style=\"height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;font-weight:{{ d.fw }};background:{{ d.bg }};color:{{ d.color }};cursor:{{ d.cursor }};text-decoration:{{ d.deco }}\">{{ d.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;font-size:11.5px;color:#5B6B7E;margin-bottom:16px\">\n          <div style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#FFC53D;display:inline-block\"><\u002Fspan>выбрано<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#F0D9D9;display:inline-block\"><\u002Fspan>занято (CRM)<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#F7FAFD;border-radius:11px;padding:13px 15px;margin-bottom:14px\">\n          <div style=\"display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px\"><span style=\"color:#5B6B7E\">Даты<\u002Fspan><b>{{ selLabel }}<\u002Fb><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px\"><span style=\"color:#5B6B7E\">Срок<\u002Fspan><b>{{ selDays }}<\u002Fb><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;font-size:14.5px\"><span style=\"color:#5B6B7E\">Итого<\u002Fspan><b style=\"font-size:16px\">{{ selSum }}<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n\n        <input value=\"{{ bookName }}\" onchange=\"{{ setBookName }}\" placeholder=\"Ваше имя\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #E3E8EF;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:9px;outline:none\" style-focus=\"border-color:#14304F\">\n        <input value=\"{{ bookPhone }}\" onchange=\"{{ setBookPhone }}\" placeholder=\"+7 (___) ___-__-__\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #E3E8EF;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:9px;outline:none\" style-focus=\"border-color:#14304F\">\n        <select value=\"{{ bookSvc }}\" onchange=\"{{ setBookSvc }}\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #E3E8EF;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:12px;background:#fff\">\n          <option value=\"taxi\">Аренда под такси<\u002Foption>\n          <option value=\"rent\">Прокат для личных целей<\u002Foption>\n          <option value=\"buyout\">Аренда с выкупом<\u002Foption>\n        <\u002Fselect>\n        <sc-if value=\"{{ bookError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12.5px;color:#C0392B;margin-bottom:10px\">{{ bookErrorText }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div onclick=\"{{ submitBooking }}\" style=\"padding:14px;background:#FFC53D;border-radius:11px;font-weight:800;font-size:15px;text-align:center;cursor:pointer\" style-hover=\"background:#F5B92C\">Отправить заявку<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#9AA7B5;text-align:center;margin-top:10px;line-height:1.5\">Нажимая кнопку, вы соглашаетесь с политикой обработки персональных данных<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ======================= АРЕНДА ПОД ТАКСИ ======================= -->\n<sc-if value=\"{{ isTaxi }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Аренда под такси\">\n  <div style=\"background:#0E2239;color:#fff\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:52px 24px;display:grid;grid-template-columns:{{ taxiHeroGrid }};gap:36px;align-items:center\">\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:1.5px;color:#FFC53D;text-transform:uppercase;margin-bottom:14px\">Аренда под такси<\u002Fdiv>\n        <h1 style=\"margin:0 0 14px;font-size:{{ h1Taxi }};font-weight:800;line-height:1.15;letter-spacing:-.4px\">Выйдите на линию Яндекс Такси за 1 день<\u002Fh1>\n        <p style=\"margin:0 0 24px;font-size:16px;color:#9FB2C6;line-height:1.6\">Машины с лицензией, брендированием и путевыми листами. Помогаем зарегистрироваться в Яндекс Про и начать зарабатывать сразу.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:12px\">\n          <div onclick=\"{{ goCatalogTaxi }}\" style=\"padding:13px 24px;background:#FFC53D;color:#14304F;border-radius:11px;font-weight:800;font-size:14.5px;cursor:pointer\" style-hover=\"background:#F5B92C\">Машины под такси<\u002Fdiv>\n          <div onclick=\"{{ openChat }}\" style=\"padding:13px 24px;border:1.5px solid #3D5675;border-radius:11px;font-weight:700;font-size:14.5px;cursor:pointer;color:#fff\" style-hover=\"border-color:#fff\">Консультация в чате<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n        <sc-for list=\"{{ taxiHighlights }}\" as=\"th\" hint-placeholder-count=\"4\">\n          <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px\">\n            <div style=\"font-size:21px;font-weight:800;color:#FFC53D;margin-bottom:4px\">{{ th.v }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#C7D3E0;line-height:1.4\">{{ th.l }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1200px;margin:0 auto;padding:28px 24px 0\">\n    <div style=\"display:flex;align-items:center;gap:16px;border:1px solid #E3E8EF;border-radius:14px;padding:16px 22px;flex-wrap:wrap\">\n      <div style=\"font-weight:800;font-size:15px;letter-spacing:-.2px;flex:none\"><span style=\"color:#EF3124\">Я<\u002Fspan>ндекс Такси<\u002Fdiv>\n      <div style=\"width:1px;height:26px;background:#E3E8EF;flex:none\"><\u002Fdiv>\n      <div style=\"font-size:13.5px;color:#3D5675;line-height:1.5\">86car — сертифицированный партнёр Яндекс Такси в Сургуте. Подключаем к работе на тарифах Эконом, Комфорт и Бизнес.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1200px;margin:0 auto;padding:48px 24px 8px\">\n    <h2 style=\"margin:0 0 24px;font-size:26px;font-weight:800\">Тарифы аренды под такси<\u002Fh2>\n    <div style=\"border:1px solid #E3E8EF;border-radius:16px;overflow:auto\">\n      <div style=\"min-width:680px\">\n      <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;background:#F7FAFD;padding:13px 20px;font-size:12px;font-weight:800;color:#5B6B7E;text-transform:uppercase;letter-spacing:.5px\">\n        <div>Класс / примеры авто<\u002Fdiv><div>Аренда в сутки<\u002Fdiv><div>Депозит<\u002Fdiv><div>Мин. срок<\u002Fdiv><div>Выкуп<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ taxiTariffs }}\" as=\"tt\" hint-placeholder-count=\"4\">\n        <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;padding:15px 20px;border-top:1px solid #EDF1F6;font-size:14px;align-items:center\">\n          <div><b>{{ tt.cls }}<\u002Fb><div style=\"font-size:12.5px;color:#5B6B7E\">{{ tt.cars }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-weight:800\">{{ tt.price }}<\u002Fdiv>\n          <div>{{ tt.dep }}<\u002Fdiv>\n          <div>{{ tt.term }}<\u002Fdiv>\n          <div style=\"color:#1B5FAB;font-weight:700\">{{ tt.buyout }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1200px;margin:0 auto;padding:48px 24px 8px\">\n    <h2 style=\"margin:0 0 20px;font-size:26px;font-weight:800\">Условия аренды<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:{{ cols1_2 }};gap:14px\">\n      <sc-for list=\"{{ rentConditions }}\" as=\"rc\" hint-placeholder-count=\"4\">\n        <div style=\"border:1px solid #E9EEF4;border-radius:14px;padding:20px 22px\">\n          <div style=\"font-weight:800;font-size:15px;margin-bottom:8px\">{{ rc.t }}<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#5B6B7E;line-height:1.65;white-space:pre-line\">{{ rc.d }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#0E2239;color:#fff;margin-top:48px\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:52px 24px\">\n      <h2 style=\"margin:0 0 20px;font-size:24px;font-weight:800\">Порядок оформления<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:{{ cols1_5 }};gap:12px;margin-bottom:40px\">\n        <sc-for list=\"{{ rentSteps }}\" as=\"rs\" hint-placeholder-count=\"5\">\n          <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:16px\">\n            <div style=\"font-size:11px;font-weight:800;color:#FFC53D;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px\">Шаг {{ rs.n }}<\u002Fdiv>\n            <div style=\"font-size:13px;line-height:1.5;color:#D9E2EC\">{{ rs.t }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <h2 style=\"margin:0 0 18px;font-size:20px;font-weight:800\">Оплата и сроки<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:{{ cols1_3 }};gap:14px\">\n        <sc-for list=\"{{ paymentInfo }}\" as=\"pi\" hint-placeholder-count=\"3\">\n          <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:18px\">\n            <div style=\"font-weight:800;font-size:14px;margin-bottom:8px;color:#FFC53D\">{{ pi.t }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#D9E2EC;line-height:1.6;white-space:pre-line\">{{ pi.d }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1200px;margin:0 auto;padding:48px 24px 8px;display:grid;grid-template-columns:{{ cols1_2 }};gap:32px\">\n    <div>\n      <h2 style=\"margin:0 0 18px;font-size:22px;font-weight:800\">Что нужно для старта<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <sc-for list=\"{{ taxiReqs }}\" as=\"tr\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border:1px solid #E9EEF4;border-radius:12px\">\n            <div style=\"flex:none;width:22px;height:22px;border-radius:50%;background:#E7F6EC;color:#2E9E5B;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800\">✓<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.5\">{{ tr }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <h2 style=\"margin:0 0 18px;font-size:22px;font-weight:800\">Что берёт на себя 86car<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <sc-for list=\"{{ taxiWeDo }}\" as=\"tw\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;gap:12px;align-items:flex-start;padding:14px 16px;background:#F7FAFD;border:1px solid #E9EEF4;border-radius:12px\">\n            <div style=\"flex:none;width:22px;height:22px;border-radius:50%;background:#FFF3D6;color:#8A6D1F;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800\">86<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.5\">{{ tw }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1200px;margin:0 auto;padding:48px 24px 60px\">\n    <div style=\"background:#F7FAFD;border:1px solid #E9EEF4;border-radius:18px;padding:32px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:24px\">\n      <div>\n        <div style=\"font-weight:800;font-size:20px;margin-bottom:6px\">Готовы начать? Свободно 38 машин под такси<\u002Fdiv>\n        <div style=\"font-size:14px;color:#5B6B7E\">Забронируйте онлайн — подтверждение в течение 15 минут<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ goCatalogTaxi }}\" style=\"flex:none;padding:14px 26px;background:#14304F;color:#fff;border-radius:11px;font-weight:700;font-size:15px;cursor:pointer\" style-hover=\"background:#0E2239\">Выбрать машину<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ======================= ВЫКУП / ЛИЗИНГ ======================= -->\n<sc-if value=\"{{ isBuyout }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Выкуп и лизинг\" style=\"max-width:1200px;margin:0 auto;padding:36px 24px 60px\">\n  <div style=\"font-size:12.5px;color:#5B6B7E;margin-bottom:10px\"><a onclick=\"{{ goHome }}\" style=\"cursor:pointer\">Главная<\u002Fa> / Аренда с выкупом и лизинг<\u002Fdiv>\n  <h1 style=\"margin:0 0 8px;font-size:32px;font-weight:800;letter-spacing:-.4px\">Аренда с выкупом и лизинг<\u002Fh1>\n  <p style=\"margin:0 0 30px;color:#5B6B7E;font-size:15.5px;max-width:640px;line-height:1.55\">Забирайте автомобиль в собственность, работая на нём. Без банков и справок о доходах — одобрение по паспорту и правам за 1 день.<\u002Fp>\n\n  <div style=\"display:grid;grid-template-columns:{{ cols1_3 }};gap:14px;margin-bottom:40px\">\n    <sc-for list=\"{{ buyoutCompare }}\" as=\"bc\" hint-placeholder-count=\"3\">\n      <div style=\"border:1.5px solid {{ bc.border }};border-radius:16px;padding:22px;background:{{ bc.bg }}\">\n        <div style=\"font-weight:800;font-size:17px;margin-bottom:10px\">{{ bc.t }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:7px\">\n          <sc-for list=\"{{ bc.rows }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div style=\"font-size:13.5px;color:#3D5675;line-height:1.45\">· {{ r }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:{{ cols1_2 }};gap:28px;align-items:start\">\n    <div style=\"border:1.5px solid #E3E8EF;border-radius:18px;padding:26px\">\n      <h2 style=\"margin:0 0 4px;font-size:21px;font-weight:800\">Калькулятор выкупа<\u002Fh2>\n      <div style=\"font-size:13px;color:#5B6B7E;margin-bottom:20px\">Предварительный расчёт, точные условия — в договоре<\u002Fdiv>\n\n      <div style=\"font-size:13px;font-weight:800;margin-bottom:7px\">Автомобиль<\u002Fdiv>\n      <select value=\"{{ calcCarIdx }}\" onchange=\"{{ setCalcCar }}\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #E3E8EF;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:18px;background:#fff\">\n        <sc-for list=\"{{ calcCarOptions }}\" as=\"o\" hint-placeholder-count=\"6\">\n          <option value=\"{{ o.i }}\">{{ o.label }}<\u002Foption>\n        <\u002Fsc-for>\n      <\u002Fselect>\n\n      <div style=\"display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-bottom:7px\"><span>Срок выкупа<\u002Fspan><span>{{ calcMonthsLabel }}<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" min=\"12\" max=\"60\" step=\"6\" value=\"{{ calcMonths }}\" onchange=\"{{ setCalcMonths }}\" style=\"width:100%;accent-color:#14304F;margin-bottom:18px\">\n\n      <div style=\"display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-bottom:7px\"><span>Первоначальный взнос<\u002Fspan><span>{{ calcDownLabel }}<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" min=\"0\" max=\"30\" step=\"5\" value=\"{{ calcDown }}\" onchange=\"{{ setCalcDown }}\" style=\"width:100%;accent-color:#14304F;margin-bottom:22px\">\n\n      <div style=\"background:#0E2239;color:#fff;border-radius:14px;padding:20px 22px\">\n        <div style=\"display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px\"><span style=\"color:#9FB2C6\">Платёж в сутки<\u002Fspan><b style=\"font-size:20px;color:#FFC53D\">{{ calcDaily }}<\u002Fb><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px\"><span style=\"color:#9FB2C6\">Платёж в месяц<\u002Fspan><b>{{ calcMonthly }}<\u002Fb><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;font-size:14px\"><span style=\"color:#9FB2C6\">Стоимость авто<\u002Fspan><b>{{ calcPrice }}<\u002Fb><\u002Fdiv>\n        <div style=\"border-top:1px solid #2C4665;margin:12px 0\"><\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#9FB2C6;line-height:1.5\">Через {{ calcMonthsLabel }} автомобиль переходит в вашу собственность. Досрочный выкуп — без штрафов.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"border:1.5px solid #E3E8EF;border-radius:18px;padding:26px;margin-bottom:16px\">\n        <h2 style=\"margin:0 0 16px;font-size:21px;font-weight:800\">Заявка на выкуп / лизинг<\u002Fh2>\n        <sc-if value=\"{{ buyoutDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#E7F6EC;border-radius:12px;padding:18px;font-size:14px;color:#1E6B3E;line-height:1.55\"><b>Заявка № {{ leadId }} отправлена в CRM.<\u002Fb> Менеджер по выкупу свяжется с вами сегодня, подготовит график платежей и договор.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ buyoutFormVisible }}\" hint-placeholder-val=\"{{ true }}\">\n          <input value=\"{{ bookName }}\" onchange=\"{{ setBookName }}\" placeholder=\"Ваше имя\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #E3E8EF;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:9px;outline:none\" style-focus=\"border-color:#14304F\">\n          <input value=\"{{ bookPhone }}\" onchange=\"{{ setBookPhone }}\" placeholder=\"+7 (___) ___-__-__\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #E3E8EF;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:9px;outline:none\" style-focus=\"border-color:#14304F\">\n          <select value=\"{{ buyoutWho }}\" onchange=\"{{ setBuyoutWho }}\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #E3E8EF;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:12px;background:#fff\">\n            <option value=\"fiz\">Физическое лицо (аренда с выкупом)<\u002Foption>\n            <option value=\"ip\">ИП / самозанятый<\u002Foption>\n            <option value=\"ooo\">Юридическое лицо (лизинг)<\u002Foption>\n          <\u002Fselect>\n          <sc-if value=\"{{ bookError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12.5px;color:#C0392B;margin-bottom:10px\">{{ bookErrorText }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <div onclick=\"{{ submitBuyout }}\" style=\"padding:13px;background:#FFC53D;border-radius:11px;font-weight:800;font-size:14.5px;text-align:center;cursor:pointer\" style-hover=\"background:#F5B92C\">Получить расчёт<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"background:#F7FAFD;border:1px solid #E9EEF4;border-radius:18px;padding:24px\">\n        <div style=\"font-weight:800;font-size:15.5px;margin-bottom:12px\">Условия одобрения<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;font-size:13.5px;color:#3D5675;line-height:1.5\">\n          <div>· Паспорт РФ/СНГ и водительское удостоверение (стаж от 5 лет)<\u002Fdiv>\n          <div>· Возраст от 23 лет, без справок о доходах<\u002Fdiv>\n          <div>· Работа в такси — в любом парке или как самозанятый<\u002Fdiv>\n          <div>· Для юрлиц: лизинг от 2 автомобилей, ускоренная амортизация<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ======================= БЛОГ ======================= -->\n<sc-if value=\"{{ isBlog }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Блог\" style=\"max-width:860px;margin:0 auto;padding:36px 24px 60px\">\n  <div style=\"font-size:12.5px;color:#5B6B7E;margin-bottom:10px\"><a onclick=\"{{ goHome }}\" style=\"cursor:pointer\">Главная<\u002Fa> / Блог<\u002Fdiv>\n  <h1 style=\"margin:0 0 8px;font-size:32px;font-weight:800;letter-spacing:-.4px\">Блог 86car<\u002Fh1>\n  <p style=\"margin:0 0 30px;color:#5B6B7E;font-size:15.5px\">Статьи о работе в такси, аренде и выкупе автомобилей в Сургуте и ХМАО.<\u002Fp>\n  <div style=\"display:flex;flex-direction:column;gap:14px\">\n    <sc-for list=\"{{ blogArticles }}\" as=\"ba\" hint-placeholder-count=\"3\">\n      <div style=\"border:1px solid #E3E8EF;border-radius:16px;overflow:hidden;background:#fff\">\n        <div onclick=\"{{ ba.toggle }}\" style=\"padding:22px 24px;cursor:pointer;display:flex;flex-direction:column;gap:8px\" style-hover=\"background:#F7FAFD\">\n          <div style=\"font-size:12px;font-weight:700;color:#5B6B7E\">{{ ba.date }} · {{ ba.kw }}<\u002Fdiv>\n          <div style=\"font-weight:800;font-size:18px;letter-spacing:-.2px\">{{ ba.title }}<\u002Fdiv>\n          <div style=\"font-size:14px;color:#5B6B7E;line-height:1.55\">{{ ba.excerpt }}<\u002Fdiv>\n          <div style=\"font-size:13px;font-weight:700;color:#1B5FAB;margin-top:4px\">{{ ba.toggleLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ ba.open }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:18px 24px 24px;font-size:14px;color:#3D5675;line-height:1.7;white-space:pre-line;border-top:1px solid #EDF1F6\">{{ ba.body }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ======================= SEO-МОДУЛЬ (АДМИНКА) ======================= -->\n<sc-if value=\"{{ isSeo }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"SEO-модуль\" style=\"background:#F2F4F7;min-height:70vh\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:30px 24px 60px\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:6px\">\n      <h1 style=\"margin:0;font-size:26px;font-weight:800\">SEO-модуль<\u002Fh1>\n      <div style=\"padding:4px 11px;background:#14304F;color:#fff;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.5px\">АДМИН-ПАНЕЛЬ<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 22px;color:#5B6B7E;font-size:14px\">Управление мета-тегами, SEO-текстами, гео-страницами и блогом без программиста<\u002Fp>\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px\">\n      <sc-for list=\"{{ seoTabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n        <div onclick=\"{{ t.click }}\" style=\"padding:9px 17px;border-radius:9px;font-size:13.5px;font-weight:700;cursor:pointer;background:{{ t.bg }};color:{{ t.color }}\">{{ t.label }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- ТАБ: Страницы -->\n    <sc-if value=\"{{ seoTabPages }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;grid-template-columns:{{ seoPagesGrid }};gap:18px;align-items:start\">\n        <div style=\"background:#fff;border:1px solid #E3E8EF;border-radius:14px;overflow:auto\">\n          <div style=\"min-width:560px\">\n          <div style=\"display:grid;grid-template-columns:1.3fr 1.7fr .6fr;padding:12px 18px;background:#F7FAFD;font-size:11.5px;font-weight:800;color:#5B6B7E;text-transform:uppercase;letter-spacing:.5px\"><div>URL<\u002Fdiv><div>Title<\u002Fdiv><div>Статус<\u002Fdiv><\u002Fdiv>\n          <sc-for list=\"{{ seoPages }}\" as=\"p\" hint-placeholder-count=\"7\">\n            <div onclick=\"{{ p.click }}\" style=\"display:grid;grid-template-columns:1.3fr 1.7fr .6fr;padding:13px 18px;border-top:1px solid #EDF1F6;font-size:13px;cursor:pointer;background:{{ p.bg }}\" style-hover=\"background:#F7FAFD\">\n              <div style=\"font-family:ui-monospace,monospace;font-size:12px;color:#1B5FAB\">{{ p.url }}<\u002Fdiv>\n              <div style=\"color:#3D5675;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:10px\">{{ p.title }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;font-weight:800;color:{{ p.stColor }}\">{{ p.st }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E3E8EF;border-radius:14px;padding:22px\">\n          <div style=\"font-weight:800;font-size:15px;margin-bottom:14px\">Редактор мета-тегов<\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:800;color:#5B6B7E;margin-bottom:6px\">Title <span style=\"font-weight:600;color:{{ titleLenColor }}\">({{ titleLen }} / 60)<\u002Fspan><\u002Fdiv>\n          <input value=\"{{ seoEditTitle }}\" onchange=\"{{ setSeoTitle }}\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #E3E8EF;border-radius:9px;padding:10px 12px;font-size:13.5px;margin-bottom:14px;outline:none\" style-focus=\"border-color:#14304F\">\n          <div style=\"font-size:12px;font-weight:800;color:#5B6B7E;margin-bottom:6px\">Description <span style=\"font-weight:600;color:{{ descLenColor }}\">({{ descLen }} / 160)<\u002Fspan><\u002Fdiv>\n          <textarea value=\"{{ seoEditDesc }}\" onchange=\"{{ setSeoDesc }}\" rows=\"3\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #E3E8EF;border-radius:9px;padding:10px 12px;font-size:13.5px;margin-bottom:14px;outline:none;resize:vertical\" style-focus=\"border-color:#14304F\"><\u002Ftextarea>\n          <div style=\"font-size:12px;font-weight:800;color:#5B6B7E;margin-bottom:6px\">H1<\u002Fdiv>\n          <input value=\"{{ seoEditH1 }}\" onchange=\"{{ setSeoH1 }}\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #E3E8EF;border-radius:9px;padding:10px 12px;font-size:13.5px;margin-bottom:18px;outline:none\" style-focus=\"border-color:#14304F\">\n          <div style=\"font-size:12px;font-weight:800;color:#5B6B7E;margin-bottom:8px\">Превью сниппета в поиске<\u002Fdiv>\n          <div style=\"border:1px solid #E9EEF4;border-radius:11px;padding:14px 16px;background:#FCFDFE;margin-bottom:16px\">\n            <div style=\"font-size:12px;color:#1E7F3C\">86car.ru{{ seoEditUrl }}<\u002Fdiv>\n            <div style=\"font-size:16px;color:#1a0dab;margin:3px 0 4px;line-height:1.3\">{{ seoEditTitle }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#4d5156;line-height:1.5\">{{ seoEditDesc }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ saveSeo }}\" style=\"padding:11px;background:#14304F;color:#fff;border-radius:9px;font-weight:700;font-size:13.5px;text-align:center;cursor:pointer\" style-hover=\"background:#0E2239\">{{ seoSaveLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ТАБ: Гео-страницы -->\n    <sc-if value=\"{{ seoTabGeo }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:grid;grid-template-columns:{{ seoGeoGrid }};gap:18px;align-items:start\">\n        <div style=\"background:#fff;border:1px solid #E3E8EF;border-radius:14px;padding:22px\">\n          <div style=\"font-weight:800;font-size:15px;margin-bottom:4px\">Генератор гео-страниц<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#5B6B7E;margin-bottom:16px\">Страницы /gorod/{город} создаются автоматически по шаблону<\u002Fdiv>\n          <sc-for list=\"{{ geoCities }}\" as=\"gc\" hint-placeholder-count=\"8\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #EDF1F6\">\n              <div>\n                <div style=\"font-weight:700;font-size:14px\">{{ gc.name }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#9AA7B5;font-family:ui-monospace,monospace\">/gorod/{{ gc.slug }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ gc.toggle }}\" style=\"width:40px;height:22px;border-radius:999px;background:{{ gc.tgBg }};position:relative;cursor:pointer;transition:background .15s\">\n                <div style=\"position:absolute;top:2px;left:{{ gc.tgLeft }};width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.25)\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E3E8EF;border-radius:14px;padding:22px\">\n          <div style=\"font-weight:800;font-size:15px;margin-bottom:14px\">Шаблон гео-страницы · переменная {город}<\u002Fdiv>\n          <div style=\"background:#F7FAFD;border:1px dashed #C9D4E0;border-radius:11px;padding:18px;margin-bottom:14px\">\n            <div style=\"font-size:11px;font-weight:800;color:#9AA7B5;margin-bottom:6px\">TITLE<\u002Fdiv>\n            <div style=\"font-size:14px;font-weight:700;margin-bottom:12px\">Аренда авто в {город} — 250 автомобилей | 86car<\u002Fdiv>\n            <div style=\"font-size:11px;font-weight:800;color:#9AA7B5;margin-bottom:6px\">H1<\u002Fdiv>\n            <div style=\"font-size:14px;font-weight:700;margin-bottom:12px\">Аренда автомобилей в {город}: под такси, посуточ
